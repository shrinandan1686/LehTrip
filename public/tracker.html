<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLR→LEH · Trip Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c0d10;
  --surface:  #14161c;
  --surface2: #1c1e27;
  --surface3: #22242f;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #e2dfd8;
  --muted:    #5a6270;
  --muted2:   #8a93a0;
  --ss:       #f97316;
  --ss-dim:   rgba(249,115,22,0.12);
  --green:    #4ade80;
  --green-dim:rgba(74,222,128,0.1);
  --red:      #f87171;
  --red-dim:  rgba(248,113,113,0.1);
  --yellow:   #fbbf24;
  --mono: 'DM Mono', monospace;
  --fuel-c: #fb923c;
  --food-c: #34d399;
  --stay-c: #818cf8;
  --act-c:  #f472b6;
  --misc-c: #94a3b8;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  position: sticky; top:0; z-index:60;
  flex-wrap: wrap;
}
.topbar-back {
  display: flex; align-items:center; gap:0.4rem;
  font-family: var(--mono); font-size:0.72rem;
  color: var(--muted2); text-decoration:none;
  padding: 0.35rem 0.7rem;
  border: 1px solid var(--border2);
  border-radius: 4px;
  transition: all 0.2s;
  white-space: nowrap;
}
.topbar-back:hover { color:var(--text); border-color:var(--ss); }
.topbar-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  flex: 1;
}
.topbar-title span { color: var(--ss); }
.topbar-actions { display:flex; gap:0.5rem; flex-wrap:wrap; }
.btn {
  font-family: var(--mono); font-size:0.7rem;
  letter-spacing:0.08em; text-transform:uppercase;
  padding: 0.4rem 0.9rem;
  border-radius: 4px; cursor:pointer;
  border: 1px solid var(--border2);
  background: var(--surface2); color:var(--muted2);
  transition: all 0.2s;
}
.btn:hover { color:var(--text); border-color:var(--ss); }
.btn-primary {
  background: var(--ss); color:#fff;
  border-color: var(--ss);
}
.btn-primary:hover { background:#ea6c0f; }
.btn-danger { color:var(--red); }
.btn-danger:hover { border-color:var(--red); background:var(--red-dim); }

/* ── SUMMARY BAR ── */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
  gap: 0.75rem;
  padding: 1rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.sum-chip {
  padding: 0.7rem 0.8rem;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.sum-label {
  font-family: var(--mono); font-size:0.58rem;
  letter-spacing:0.15em; text-transform:uppercase;
  color: var(--muted); margin-bottom:0.25rem;
}
.sum-val {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size:1.2rem; line-height:1;
}
.sum-sub { font-size:0.65rem; color:var(--muted); margin-top:0.2rem; font-family:var(--mono); }
.chip-ss   { background:var(--ss-dim);   border-color:rgba(249,115,22,0.2); }
.chip-tot  { background:var(--surface2); border-color:var(--border2); }
.chip-ss .sum-val { color:var(--ss); }
.chip-tot .sum-val { color:var(--text); }

/* BUDGET PROGRESS */
.budget-track {
  padding: 0.8rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items:center; gap:1rem;
  flex-wrap: wrap;
}
.btrack-label { font-family:var(--mono); font-size:0.65rem; color:var(--muted); white-space:nowrap; }
.btrack-bar-wrap { flex:1; min-width:120px; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
.btrack-bar { height:100%; border-radius:3px; transition: width 0.4s ease; background:var(--ss); }
.btrack-bar.over { background:var(--red); }
.btrack-pct { font-family:var(--mono); font-size:0.7rem; color:var(--muted2); white-space:nowrap; min-width:35px; text-align:right; }

/* ── TABS ── */
.tabs {
  display: flex; gap:0;
  border-bottom: 1px solid var(--border2);
  overflow-x:auto; scrollbar-width:none;
  background: var(--surface);
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  padding: 0.75rem 1.2rem;
  font-family:var(--mono); font-size:0.7rem;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--muted); cursor:pointer;
  border-bottom: 2px solid transparent;
  white-space:nowrap; flex-shrink:0;
  transition: all 0.2s;
  background: transparent; border-top:none; border-left:none; border-right:none;
}
.tab:hover { color:var(--text); }
.tab.active { color:var(--ss); border-bottom-color:var(--ss); }

/* ── MAIN ── */
.main { max-width:1100px; margin:0 auto; padding:1.5rem; }

/* ── DAY PANEL ── */
.day-panel { display:none; }
.day-panel.active { display:block; }

.day-header {
  display: flex; align-items:flex-start;
  justify-content:space-between; gap:1rem;
  margin-bottom:1.2rem; flex-wrap:wrap;
}
.day-num-label {
  font-family:var(--mono); font-size:0.65rem;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--muted); margin-bottom:0.2rem;
}
.day-title-text {
  font-family:'Syne',sans-serif; font-weight:800;
  font-size:1.5rem; color:var(--text); line-height:1.1;
}
.day-date-text { font-size:0.8rem; color:var(--muted2); margin-top:0.2rem; font-family:var(--mono); }
.day-phase-badge {
  font-family:var(--mono); font-size:0.62rem;
  letter-spacing:0.1em; text-transform:uppercase;
  padding:0.25rem 0.6rem; border-radius:3px; margin-top:0.4rem; display:inline-block;
}
.phase-solo   { background:var(--ss-dim); color:var(--ss); }
.phase-group  { background:var(--split-dim); color:var(--split); }
.phase-wfh    { background:var(--green-dim); color:var(--green); }
.phase-prep   { background:rgba(251,191,36,0.12); color:var(--yellow); }

.day-totals {
  display:flex; gap:0.8rem; flex-wrap:wrap;
}
.day-total-chip {
  text-align:right;
  padding: 0.5rem 0.8rem;
  background:var(--surface2); border-radius:6px;
  border:1px solid var(--border);
}
.day-total-chip .dtc-label {
  font-family:var(--mono); font-size:0.58rem;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--muted); margin-bottom:0.15rem;
}
.day-total-chip .dtc-val {
  font-family:'Syne',sans-serif; font-weight:700;
  font-size:1.1rem; line-height:1;
}

/* ── ENTRY TABLE ── */
.entry-table-wrap { overflow-x:auto; }
.entry-table {
  width:100%; border-collapse:collapse;
  border:1px solid var(--border);
  border-radius:8px; overflow:hidden;
  font-size:0.82rem;
}
.entry-table thead tr { background:var(--surface2); }
.entry-table th {
  padding:0.55rem 0.7rem;
  font-family:var(--mono); font-size:0.6rem;
  letter-spacing:0.15em; text-transform:uppercase;
  color:var(--muted); font-weight:400;
  border-bottom:1px solid var(--border2); text-align:left;
}
.entry-table th.r { text-align:right; }
.entry-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; }
.entry-table tbody tr:last-child { border-bottom:none; }
.entry-table tbody tr:hover { background:rgba(255,255,255,0.02); }
.entry-table td { padding:0.55rem 0.7rem; vertical-align:middle; }
.entry-table td.r { text-align:right; }

/* inputs inside table */
.entry-input {
  background:transparent; border:none; outline:none;
  color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:0.82rem; width:100%;
  padding:0.1rem 0; min-width:60px;
}
.entry-input:focus { border-bottom:1px solid var(--ss); }
.entry-input::placeholder { color:var(--muted); }

.amount-input {
  font-family:var(--mono); font-size:0.82rem;
  background:transparent; border:none; outline:none;
  color:var(--text); text-align:right; width:90px;
}
.amount-input:focus { border-bottom:1px solid var(--ss); }
.amount-input::placeholder { color:var(--muted); }

.cat-select {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:3px; color:var(--text);
  font-family:var(--mono); font-size:0.68rem;
  padding:0.2rem 0.4rem; cursor:pointer;
  letter-spacing:0.05em;
}
.cat-select:focus { outline:none; border-color:var(--ss); }

.who-select {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:3px; color:var(--text);
  font-family:var(--mono); font-size:0.68rem;
  padding:0.2rem 0.4rem; cursor:pointer;
}
.who-select:focus { outline:none; border-color:var(--ss); }

.delete-btn {
  background:none; border:none; cursor:pointer;
  color:var(--muted); font-size:0.9rem;
  padding:0.2rem 0.4rem; border-radius:3px;
  transition:all 0.15s;
}
.delete-btn:hover { color:var(--red); background:var(--red-dim); }

/* category dot */
.cat-dot {
  display:inline-block; width:7px; height:7px;
  border-radius:50%; margin-right:0.4rem; flex-shrink:0;
}

/* add row */
.add-row-btn {
  display:flex; align-items:center; gap:0.5rem;
  padding:0.6rem 0.8rem;
  background:none; border:none; cursor:pointer;
  color:var(--muted2); font-family:var(--mono);
  font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase;
  width:100%; transition:color 0.2s;
}
.add-row-btn:hover { color:var(--ss); }

/* day notes */
.day-notes-label {
  font-family:var(--mono); font-size:0.62rem;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--muted); margin-bottom:0.4rem;
  margin-top:1.2rem;
}
.day-notes {
  width:100%; background:var(--surface2);
  border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:0.82rem; padding:0.7rem;
  resize:vertical; min-height:60px;
  line-height:1.5;
}
.day-notes:focus { outline:none; border-color:var(--ss); }

/* ── OVERVIEW TAB ── */
.overview-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:1rem;
  margin-bottom:1.5rem;
}
.ov-card {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:8px; overflow:hidden;
}
.ov-card-head {
  padding:0.7rem 1rem;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  font-family:'Syne',sans-serif; font-weight:700;
  font-size:0.82rem; letter-spacing:0.05em; text-transform:uppercase;
  color:var(--muted2);
}
.ov-card-body { padding:0.8rem 1rem; }
.ov-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:0.35rem 0; border-bottom:1px solid var(--border);
  font-size:0.8rem;
}
.ov-row:last-child { border-bottom:none; }
.ov-label { color:var(--muted2); display:flex; align-items:center; gap:0.4rem; }
.ov-val { font-family:var(--mono); font-weight:500; }

/* category breakdown donut placeholder */
.cat-bars { margin-top:0.5rem; }
.cat-bar-row { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.45rem; }
.cat-bar-label { font-family:var(--mono); font-size:0.65rem; color:var(--muted2); width:70px; flex-shrink:0; }
.cat-bar-track { flex:1; height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
.cat-bar-amt { font-family:var(--mono); font-size:0.65rem; color:var(--text); width:55px; text-align:right; flex-shrink:0; }

/* vs budget */
.vs-budget {
  padding:1rem; background:var(--surface2);
  border-radius:8px; border:1px solid var(--border2);
  margin-bottom:1.5rem;
}
.vs-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem; color:var(--muted2); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:1rem; }
.vs-row {
  display:flex; align-items:center; gap:0.8rem; margin-bottom:0.7rem; flex-wrap:wrap;
}
.vs-cat { font-family:var(--mono); font-size:0.68rem; color:var(--muted2); width:90px; flex-shrink:0; }
.vs-bars { flex:1; min-width:100px; }
.vs-track { height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; margin-bottom:2px; }
.vs-actual { height:100%; border-radius:3px; transition:width 0.5s; }
.vs-budgeted { height:100%; border-radius:3px; background:rgba(255,255,255,0.12); }
.vs-nums { font-family:var(--mono); font-size:0.65rem; white-space:nowrap; }
.vs-nums .actual { color:var(--text); }
.vs-nums .budgeted { color:var(--muted); }

/* splitwise export */
.export-card {
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:8px; padding:1rem 1.2rem; margin-bottom:1.5rem;
}
.export-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem; color:var(--muted2); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.8rem; }
.export-table { width:100%; border-collapse:collapse; font-size:0.78rem; }
.export-table th { font-family:var(--mono); font-size:0.6rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; padding:0.3rem 0.5rem; border-bottom:1px solid var(--border); text-align:left; }
.export-table td { padding:0.35rem 0.5rem; border-bottom:1px solid var(--border); }
.export-table tr:last-child td { border-bottom:none; }

/* ── WHO BADGES ── */
.badge {
  font-family:var(--mono); font-size:0.58rem;
  letter-spacing:0.06em; text-transform:uppercase;
  padding:0.12rem 0.35rem; border-radius:2px; white-space:nowrap;
}
.b-ss { background:var(--ss-dim); color:var(--ss); }

/* ── MOBILE ── */
@media (max-width:600px) {
  .main { padding:1rem 0.75rem; }
  .summary-bar { grid-template-columns:1fr 1fr; }
  .day-title-text { font-size:1.1rem; }
  .entry-table th:nth-child(2), .entry-table td:nth-child(2) { display:none; }
}

/* ── PRINT ── */
@media print {
  .topbar-actions, .add-row-btn, .delete-btn, .tabs { display:none; }
  body { background:white; color:black; }
}

/* toast */
.toast {
  position:fixed; bottom:1.5rem; right:1.5rem;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:6px; padding:0.7rem 1rem;
  font-family:var(--mono); font-size:0.72rem; color:var(--text);
  transform:translateY(8px); opacity:0;
  transition:all 0.3s; pointer-events:none;
  z-index:99;
}
.toast.show { transform:translateY(0); opacity:1; }

/* category pills legend */
.cat-legend {
  display:flex; gap:0.6rem; flex-wrap:wrap; margin-bottom:1rem;
}
.cat-pill {
  display:flex; align-items:center; gap:0.3rem;
  font-family:var(--mono); font-size:0.62rem;
  color:var(--muted2); padding:0.2rem 0.5rem;
  background:var(--surface2); border-radius:3px;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="index.html" class="topbar-back">← Itinerary</a>
  <div class="topbar-title">BLR <span>→</span> LEH Expense Tracker</div>
  <div class="topbar-actions">
    <button class="btn" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn btn-danger" onclick="confirmReset()">⚠ Reset All</button>
    <a href="leh-budget.html" class="btn">📊 Budget Details</a>
  </div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar" id="summaryBar">
  <div class="sum-chip chip-ss">
    <div class="sum-label">S&S Spent</div>
    <div class="sum-val" id="sum-ss">₹0</div>
    <div class="sum-sub">of ₹1,95,577 budget</div>
  </div>
  <div class="sum-chip chip-tot">
    <div class="sum-label">All Entries</div>
    <div class="sum-val" id="sum-total">₹0</div>
    <div class="sum-sub" id="sum-entries">0 entries</div>
  </div>
</div>

<!-- BUDGET PROGRESS -->
<div class="budget-track">
  <div class="btrack-label">Budget Used</div>
  <div class="btrack-bar-wrap">
    <div class="btrack-bar" id="budgetBar" style="width:0%"></div>
  </div>
  <div class="btrack-pct" id="budgetPct">0%</div>
</div>

<!-- TABS -->
<div class="tabs" id="tabBar">
  <button class="tab active" onclick="switchTab('overview')">📊 Overview</button>
  <!-- Day tabs injected by JS -->
</div>

<!-- MAIN -->
<div class="main">

  <!-- OVERVIEW PANEL -->
  <div class="day-panel active" id="panel-overview">

    <div class="vs-budget" id="vsBudget">
      <div class="vs-title">Actual vs Budgeted</div>
      <!-- rendered by JS -->
    </div>

    <div class="overview-grid">
      <div class="ov-card">
        <div class="ov-card-head">By Category</div>
        <div class="ov-card-body">
          <div class="cat-bars" id="catBars"></div>
        </div>
      </div>
      <div class="ov-card">
        <div class="ov-card-head">Budget Summary</div>
        <div class="ov-card-body" id="whoBreakdown"></div>
      </div>
      <div class="ov-card">
        <div class="ov-card-head">Top Expenses</div>
        <div class="ov-card-body" id="topExpenses"></div>
      </div>
    </div>


  </div>

  <!-- DAY PANELS injected by JS -->
</div>

<div class="toast" id="toast"></div>

<script src="js/tracker-logic.js"></script>
<script>
// ─────────────────────────────────────────────
// STATE  (loaded from D1 via /api/tracker)
// ─────────────────────────────────────────────
let state = { entries: {}, notes: {} };
DAYS.forEach(d => { state.entries[d.id] = []; state.notes[d.id] = ''; });

async function ensurePrepPrefill() {
  const prepDayId = 'p0';
  const hasPrepDay = DAYS.some(d => d.id === prepDayId);
  if (!hasPrepDay) return;
  if ((state.entries[prepDayId] || []).length > 0) return;
  if (!Array.isArray(PREP_EXPENSE_TEMPLATES) || PREP_EXPENSE_TEMPLATES.length === 0) return;

  const prefilled = PREP_EXPENSE_TEMPLATES.map((item, idx) => ({
    id: `prep_${idx + 1}`,
    desc: item.desc || '',
    cat: item.cat || 'misc',
    who: item.who || 'ss',
    amount: '',
  }));
  state.entries[prepDayId] = prefilled;

  try {
    const res = await fetch('/api/entries', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dayId: prepDayId, entries: prefilled }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    toast('Day 0 prep list prefilled');
  } catch (err) {
    console.error('Failed to prefill prep entries:', err);
    toast('Day 0 prefill saved locally only — sync failed');
  }
}

async function fetchState() {
  try {
    const res = await fetch('/api/tracker');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    DAYS.forEach(d => {
      state.entries[d.id] = data.entries?.[d.id] || [];
      state.notes[d.id]   = data.notes?.[d.id]   ?? '';
    });
  } catch (err) {
    console.error('Could not load from API:', err);
    toast('Could not reach server — showing empty state', 4000);
  }
}

// ─────────────────────────────────────────────
// BUILD TABS + PANELS
// ─────────────────────────────────────────────
function buildUI() {
  const tabBar = document.getElementById('tabBar');
  const main   = document.querySelector('.main');

  DAYS.forEach(day => {
    // Tab
    const tab = document.createElement('button');
    tab.className = 'tab';
    tab.id = 'tab-' + day.id;
    tab.innerHTML = `<span style="opacity:0.5;margin-right:0.3em">${phaseIcon(day.phase)}</span>${day.label}`;
    tab.onclick = () => switchTab(day.id);
    tabBar.appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'day-panel';
    panel.id = 'panel-' + day.id;
    panel.innerHTML = buildDayPanel(day);
    main.appendChild(panel);
  });
}

function phaseIcon(p) {
  return p === 'group' ? '🏔️' : p === 'wfh' ? '💻' : p === 'prep' ? '🛒' : '🚗';
}

function buildDayPanel(day) {
  const phaseLabelMap = { prep:'Preparation Costs', solo:'Solo Phase', group:'Group Phase', wfh:'WFH Phase' };
  const showFuel = day.phase !== 'prep'; // Show fuel log on all driving days
  return `
    <div class="day-header">

// ─────────────────────────────────────────────
// ENTRIES
// ─────────────────────────────────────────────
async function addEntry(dayId, entry = null) {
  const e = entry || {
    id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    desc: '', cat: 'food', who: 'ss', amount: ''
  };
  state.entries[dayId].push(e);
  renderEntries(dayId);
  updateAll();

  try {
    const res = await fetch('/api/entries', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dayId, entry: e }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
  } catch (err) {
    console.error('Failed to save entry:', err);
    toast('Entry saved locally only — sync failed');
  }
}

async function removeEntry(dayId, entryId) {
  state.entries[dayId] = state.entries[dayId].filter(e => e.id != entryId);
  renderEntries(dayId);
  updateAll();

  try {
    const res = await fetch(`/api/entries/${entryId}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
  } catch (err) {
    console.error('Failed to delete entry:', err);
  }
}

function patchAmountCells(dayId, entryId) {
  // no-op: amount column is the only numeric cell now
}

// ─────────────────────────────────────────────
// FUEL LOG
// ─────────────────────────────────────────────
const FUEL_BUDGET = 56627; // total fuel budget for S&S

function logFuel(dayId) {
  const litresEl = document.getElementById('flog-litres-' + dayId);
  const rateEl   = document.getElementById('flog-rate-'   + dayId);
  const odoEl    = document.getElementById('flog-odo-'    + dayId);
  const preview  = document.getElementById('flog-preview-' + dayId);

  const litres = parseFloat(litresEl?.value) || 0;
  const rate   = parseFloat(rateEl?.value)   || 0;
  const odo    = rateEl?.value ? odoEl?.value.trim() : '';

  if (!litres || !rate) {
    if (preview) preview.textContent = '⚠️ Enter litres and ₹/litre to log';
    return;
  }

  const cost = Math.round(litres * rate);
  const odoStr = odo ? ` · Odo: ${odo}km` : '';
  const desc = `[Fuel] ${litres}L @ ₹${rate}/L${odoStr}`;

  addEntry(dayId, {
    id: Date.now() + '_fuel',
    desc,
    cat: 'fuel',
    who: 'ss',
    amount: cost
  });

  // Reset inputs
  if (litresEl) litresEl.value = '';
  if (rateEl)   rateEl.value   = '';
  if (odoEl)    odoEl.value    = '';
  if (preview)  preview.textContent = `✓ Logged ₹${cost.toLocaleString('en-IN')} (${litres}L @ ₹${rate})`;
  setTimeout(() => { if (preview) preview.textContent = ''; }, 3000);

  // Update day fuel cost display
  updateFuelDayCost(dayId);
}

function updateFuelDayCost(dayId) {
  const el = document.getElementById('fuel-day-cost-' + dayId);
  if (!el) return;
  const dayFuel = (state.entries[dayId] || [])
    .filter(e => e.cat === 'fuel')
    .reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);

  const totalFuel = Object.values(state.entries)
    .flat()
    .filter(e => e?.cat === 'fuel')
    .reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);

  const pct = Math.min(100, (totalFuel / FUEL_BUDGET) * 100).toFixed(0);
  const over = totalFuel > FUEL_BUDGET;
  el.innerHTML = dayFuel > 0
    ? `Today: <span style="color:var(--fuel-c)">₹${dayFuel.toLocaleString('en-IN')}</span>` +
      ` &nbsp;|&nbsp; Trip total: <span style="color:${over ? 'var(--red)':'var(--fuel-c)'}">₹${Math.round(totalFuel).toLocaleString('en-IN')}</span>` +
      ` <span style="color:var(--muted)">(${pct}% of ₹${FUEL_BUDGET.toLocaleString('en-IN')} budget)</span>`
    : '';
}

// Live preview while typing fuel inputs
document.addEventListener('input', e => {
  const id = e.target?.id || '';
  const match = id.match(/^flog-(litres|rate)-(.+)$/);
  if (!match) return;
  const dayId = match[2];
  const litres = parseFloat(document.getElementById('flog-litres-' + dayId)?.value) || 0;
  const rate   = parseFloat(document.getElementById('flog-rate-'   + dayId)?.value) || 0;
  const preview = document.getElementById('flog-preview-' + dayId);
  if (preview && litres && rate) {
    preview.textContent = `→ ₹${Math.round(litres * rate).toLocaleString('en-IN')} total cost`;
  } else if (preview) {
    preview.textContent = '';
  }
});

// ─────────────────────────────────────────────
// WELLNESS LOG (localStorage)
// ─────────────────────────────────────────────

const WELLNESS_KEY = 'leh_wellness';

function _getWellnessStore() {
  try { return JSON.parse(localStorage.getItem(WELLNESS_KEY) || '{}'); } catch(_) { return {}; }
}
function _setWellnessStore(store) {
  try { localStorage.setItem(WELLNESS_KEY, JSON.stringify(store)); } catch(_) {}
}

function toggleWellness(dayId) {
  const body   = document.getElementById('well-body-' + dayId);
  const toggle = document.getElementById('well-toggle-' + dayId);
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (toggle) toggle.textContent = isOpen ? '▼' : '▲';
}

function setHeadache(dayId, value) {
  // Highlight selected button
  [1,2,3,4,5].forEach(n => {
    const btn = document.getElementById(`well-h${n}-${dayId}`);
    if (!btn) return;
    const active = n === value;
    const hue = n === 1 ? '#22c55e' : n === 2 ? '#84cc16' : n === 3 ? '#f59e0b' : n === 4 ? '#ef4444' : '#7f1d1d';
    btn.style.background  = active ? hue : 'var(--surface)';
    btn.style.color       = active ? '#fff' : 'var(--muted)';
    btn.style.borderColor = active ? hue : 'var(--border2)';
  });

  // Store in dataset for reading
  const row = document.getElementById('well-headache-row-' + dayId);
  if (row) row.dataset.val = value;
  wellnessChanged(dayId);
}

function wellnessChanged(dayId) {
  const store = _getWellnessStore();
  const spo2El    = document.getElementById('well-spo2-'    + dayId);
  const waterEl   = document.getElementById('well-water-'   + dayId);
  const diamoxEl  = document.getElementById('well-diamox-'  + dayId);
  const headEl    = document.getElementById('well-headache-row-' + dayId);

  const spo2    = spo2El    ? spo2El.value.trim()    : '';
  const water   = waterEl   ? waterEl.value.trim()   : '';
  const diamox  = diamoxEl  ? diamoxEl.checked        : false;
  const headache= headEl    ? parseInt(headEl.dataset.val || '0') : 0;

  store[dayId] = { spo2, water, diamox, headache, ts: Date.now() };
  _setWellnessStore(store);

  // AMS alert
  const alertEl = document.getElementById('well-alert-'   + dayId);
  const spo2Num = parseFloat(spo2);
  if (alertEl) alertEl.style.display = (spo2 && spo2Num < 90) ? 'block' : 'none';

  // Summary in collapsed header
  updateWellnessSummary(dayId, { spo2, water, diamox, headache });

  // Flash saved
  const statusEl = document.getElementById('well-save-status-' + dayId);
  if (statusEl) { statusEl.textContent = 'Saved ✓'; setTimeout(() => { statusEl.textContent = ''; }, 1500); }
}

function updateWellnessSummary(dayId, data) {
  const sumEl = document.getElementById('well-summary-' + dayId);
  if (!sumEl) return;
  const parts = [];
  if (data.spo2) {
    const n = parseFloat(data.spo2);
    const col = n >= 95 ? '#22c55e' : n >= 90 ? '#f59e0b' : '#ef4444';
    parts.push(`<span style="color:${col};font-weight:700">SpO2 ${data.spo2}%</span>`);
  }
  if (data.water) parts.push(`💧${data.water}L`);
  if (data.headache > 1) {
    const hcol = data.headache <= 2 ? '#84cc16' : data.headache <= 3 ? '#f59e0b' : '#ef4444';
    parts.push(`<span style="color:${hcol}">H${data.headache}/5</span>`);
  }
  if (data.diamox) parts.push('💊');
  sumEl.innerHTML = parts.join(' · ');
}

function loadAllWellness() {
  const store = _getWellnessStore();
  DAYS.forEach(day => {
    const data = store[day.id];
    if (!data) return;
    const spo2El   = document.getElementById('well-spo2-'   + day.id);
    const waterEl  = document.getElementById('well-water-'  + day.id);
    const diamoxEl = document.getElementById('well-diamox-' + day.id);
    if (spo2El  && data.spo2)   spo2El.value    = data.spo2;
    if (waterEl && data.water)  waterEl.value   = data.water;
    if (diamoxEl && data.diamox) diamoxEl.checked = true;
    if (data.headache) setHeadache(day.id, data.headache);

    // AMS alert restore
    const alertEl = document.getElementById('well-alert-' + day.id);
    const spo2Num = parseFloat(data.spo2 || '');
    if (alertEl && data.spo2 && spo2Num < 90) alertEl.style.display = 'block';

    updateWellnessSummary(day.id, data);
  });
}

const _updateTimers = {};
function updateEntry(dayId, entryId, field, value) {
  const e = state.entries[dayId].find(e => e.id == entryId);
  if (!e) return;
  e[field] = field === 'amount' ? value : value;  // keep raw string for amount
  if (field !== 'amount' && field !== 'desc') {
    renderEntries(dayId);
    updateAll();
  }
  // amount: no DOM change here — onblur handles the visual refresh

  // Debounce API call (600ms)
  clearTimeout(_updateTimers[entryId]);
  _updateTimers[entryId] = setTimeout(async () => {
    try {
      const res = await fetch(`/api/entries/${entryId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entry: e }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch (err) {
      console.error('Failed to update entry:', err);
    }
  }, 600);
}

// Called onblur — safe to update calculated cells now that input lost focus
function commitAmount(dayId, entryId, value) {
  const e = state.entries[dayId].find(e => e.id == entryId);
  if (!e) return;
  e.amount = parseFloat(value) || '';
  patchAmountCells(dayId, entryId);
  renderDayTotals(dayId);
  updateAll();
}

const _noteTimers = {};
function saveNote(dayId, val) {
  state.notes[dayId] = val;

  // Debounce API call (800ms) — notes fire on every keystroke
  clearTimeout(_noteTimers[dayId]);
  _noteTimers[dayId] = setTimeout(async () => {
    try {
      const res = await fetch(`/api/notes/${dayId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: val }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch (err) {
      console.error('Failed to save note:', err);
    }
  }, 800);
}

function renderEntries(dayId) {
  const tbody = document.getElementById('entries-' + dayId);
  if (!tbody) return;
  tbody.innerHTML = '';

  const entries = state.entries[dayId] || [];
  entries.forEach(e => {
    const tr = document.createElement('tr');
    tr.dataset.entryId = String(e.id);
    tr.innerHTML = `
      <td>
        <input class="entry-input" value="${escHtml(e.desc)}" placeholder="What was this for?"
          onchange="updateEntry('${dayId}','${e.id}','desc',this.value)"
          oninput="updateEntry('${dayId}','${e.id}','desc',this.value)">
      </td>
      <td>
        <select class="cat-select" onchange="updateEntry('${dayId}','${e.id}','cat',this.value)">
          ${Object.entries(CATS).map(([k,v]) =>
            `<option value="${k}" ${e.cat===k?'selected':''}>${v.label}</option>`
          ).join('')}
        </select>
      </td>
      <td class="r">
        <input class="amount-input" type="text" inputmode="decimal"
          value="${e.amount === '' ? '' : e.amount}" placeholder="0"
          oninput="updateEntry('${dayId}','${e.id}','amount',this.value)"
          onblur="commitAmount('${dayId}','${e.id}',this.value)">
      </td>
      <td>
        <button class="delete-btn" onclick="removeEntry('${dayId}','${e.id}')" title="Remove">✕</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  renderDayTotals(dayId);
}

function renderDayTotals(dayId) {
  const box = document.getElementById('daytotals-' + dayId);
  if (!box) return;
  const {total} = calcDayTotals(dayId, state.entries);

  box.innerHTML = `
    <div class="day-total-chip chip-ss">
      <div class="dtc-label">Day Total</div>
      <div class="dtc-val" style="color:var(--ss)">₹${fmtNum(total)}</div>
    </div>
  `;
}

// ─────────────────────────────────────────────
// AGGREGATES
// ─────────────────────────────────────────────
function updateAll() {
  const g = calcGlobalTotals(state.entries);

  // summary bar
  document.getElementById('sum-ss').textContent    = '₹'+fmtNum(g.ssTotal);
  document.getElementById('sum-total').textContent = '₹'+fmtNum(g.grandTotal);
  document.getElementById('sum-entries').textContent = g.count + ' entr' + (g.count===1?'y':'ies');

  // progress bar
  const ssPct = Math.min(100, (g.ssTotal / SS_BUDGET) * 100);
  const ssBar = document.getElementById('budgetBar');
  ssBar.style.width = ssPct + '%';
  ssBar.className = 'btrack-bar' + (ssPct > 95 ? ' over' : '');
  document.getElementById('budgetPct').textContent = ssPct.toFixed(1) + '%';

  renderOverview(g);
}

function renderOverview(g) {
  // Cat bars
  const catMax = Math.max(...Object.values(g.byCat), 1);
  const catBarsEl = document.getElementById('catBars');
  if (catBarsEl) {
    catBarsEl.innerHTML = Object.entries(g.byCat).map(([k, v]) => `
      <div class="cat-bar-row">
        <div class="cat-bar-label">${CATS[k].label}</div>
        <div class="cat-bar-track">
          <div class="cat-bar-fill" style="width:${(v/catMax*100).toFixed(1)}%;background:${CATS[k].color}"></div>
        </div>
        <div class="cat-bar-amt">₹${fmtNum(v)}</div>
      </div>
    `).join('');
  }

  // Spend summary
  const whoEl = document.getElementById('whoBreakdown');
  if (whoEl) {
    whoEl.innerHTML = `
      <div class="ov-row">
        <div class="ov-label"><span class="badge b-ss">S&amp;S Total</span></div>
        <div class="ov-val" style="color:var(--ss)">₹${fmtNum(g.ssTotal)}</div>
      </div>
      <div class="ov-row" style="margin-top:0.3rem;padding-top:0.5rem;border-top:1px solid var(--border2)">
        <div class="ov-label">Budget Remaining</div>
        <div class="ov-val" style="color:${g.ssTotal > SS_BUDGET ? 'var(--red)' : 'var(--green)'}">₹${fmtNum(SS_BUDGET - g.ssTotal)}</div>
      </div>
    `;
  }

  // Top expenses
  const topEl = document.getElementById('topExpenses');
  if (topEl) {
    const top = g.allEntries.slice(0,8);
    topEl.innerHTML = top.length ? top.map(e => `
      <div class="ov-row">
        <div class="ov-label" style="flex-direction:column;align-items:flex-start;gap:0.1rem">
          <span>${escHtml(e.desc || '—')}</span>
          <span style="font-size:0.65rem;color:var(--muted)">${e.dayTitle}</span>
        </div>
        <div class="ov-val" style="font-family:var(--mono)">₹${fmtNum(e.amtNum)}</div>
      </div>
    `).join('') : '<div style="color:var(--muted);font-size:0.8rem;padding:0.5rem 0">No entries yet</div>';
  }

  // vs budget
  renderVsBudget(g);
}

function renderVsBudget(g) {
  const vb = document.getElementById('vsBudget');
  if (!vb) return;
  const categories = [
    ['fuel', 'Fuel',    56627, g.byCat.fuel||0,  'var(--fuel-c)'],
    ['stay', 'Stay',    81500, g.byCat.stay||0,  'var(--stay-c)'],
    ['food', 'Food',    22400, g.byCat.food||0,  'var(--food-c)'],
    ['act',  'Activ.',   2350, g.byCat.act||0,   'var(--act-c)'],
    ['misc', 'Prep',    31900, g.byCat.misc||0,  'var(--misc-c)'],
    ['toll', 'Toll',      800, g.byCat.toll||0,  '#60a5fa'],
  ];
  const maxBudget = Math.max(...categories.map(c => c[2]));
  const rows = categories.map(([k, label, budget, actual, color]) => {
    const actualPct  = Math.min(100, (actual/maxBudget)*100).toFixed(1);
    const budgetPct  = ((budget/maxBudget)*100).toFixed(1);
    const over = actual > budget;
    return `
      <div class="vs-row">
        <div class="vs-cat">${label}</div>
        <div class="vs-bars">
          <div class="vs-track">
            <div class="vs-actual" style="width:${actualPct}%;background:${over?'var(--red)':color}"></div>
          </div>
          <div class="vs-track">
            <div class="vs-budgeted" style="width:${budgetPct}%"></div>
          </div>
        </div>
        <div class="vs-nums">
          <span class="actual" style="color:${over?'var(--red)':color}">₹${fmtNum(actual)}</span>
          <span class="budgeted"> / ₹${fmtNum(budget)}</span>
        </div>
      </div>
    `;
  }).join('');
  vb.innerHTML = '<div class="vs-title">Actual vs Budgeted <span style="font-size:0.7rem;color:var(--muted);font-family:var(--mono)"> — top bar = actual · bottom bar = budget</span></div>' + rows;
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
let currentTab = 'overview';
function switchTab(id) {
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id)?.classList.add('active');
  document.getElementById('tab-' + id)?.classList.add('active');
  currentTab = id;
}

// ─────────────────────────────────────────────
// EXPORT CSV
// ─────────────────────────────────────────────
function exportCSV() {
  const rows = [['Day','Date','Phase','Description','Category','Amount']];
  DAYS.forEach(day => {
    (state.entries[day.id] || []).forEach(e => {
      const amt = parseFloat(e.amount) || 0;
      rows.push([
        day.label, day.date, day.phase,
        e.desc||'', CATS[e.cat]?.label||e.cat,
        amt
      ]);
    });
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'blr_leh_expenses.csv'; a.click();
  toast('CSV downloaded!');
}

// ─────────────────────────────────────────────
// RESET
// ─────────────────────────────────────────────
async function confirmReset() {
  if (!confirm('Reset ALL expense entries? This cannot be undone.')) return;
  DAYS.forEach(d => { state.entries[d.id] = []; });
  DAYS.forEach(d => renderEntries(d.id));
  updateAll();

  try {
    const res = await fetch('/api/entries', { method: 'DELETE' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    toast('All entries cleared');
  } catch (err) {
    toast('Cleared locally — server sync failed');
  }
}

function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
async function init() {
  buildUI();
  await fetchState();
  await ensurePrepPrefill();
  // Render all entry tables with fetched data
  DAYS.forEach(d => renderEntries(d.id));
  // Populate notes textareas (built before fetch, so fill them now)
  DAYS.forEach(d => {
    const ta = document.getElementById('notes-' + d.id);
    if (ta) ta.value = state.notes[d.id] || '';
  });
  // Update fuel log headers with existing fuel entries
  DAYS.forEach(d => updateFuelDayCost(d.id));
  // Restore wellness log data from localStorage
  loadAllWellness();
  updateAll();
}

init();
</script>
